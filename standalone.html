// ─── Router ───────────────────────────────────────────────────────────────────
const RouterCtx = createContext({ path:'/', navigate:()=>{}, params:{} });

function Router({ children }) {
  const getHash = () => decodeURIComponent(window.location.hash.slice(1) || '/');
  const [path, setPath] = useState(getHash);
  useEffect(() => {
    const h = () => setPath(getHash());
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const navigate = useCallback((to) => { window.location.hash = to; }, []);
  return <RouterCtx.Provider value={{ path, navigate, params:{} }}>{children}</RouterCtx.Provider>;
}

function matchPath(pattern, path) {
  const pp = pattern.split('/'), ap = path.split('/');
  if (pp.length !== ap.length) return null;
  const params = {};
  for (let i=0; i<pp.length; i++) {
    if (pp[i].startsWith(':')) { params[pp[i].slice(1)] = ap[i]; }
    else if (pp[i] !== ap[i]) return null;
  }
  return params;
}

// Route is defined below alongside Routes

function useNavigate() { return useContext(RouterCtx).navigate; }
function useParams() { return useContext(RouterCtx).params; }
function useLocation() { return useContext(RouterCtx); }

function AppProvider({ children }) {

      currentBroker, isAdminAuthed: S.isAdmin(),
      loginBroker(email, pwd) {
        const b = S.getBrokerByEmail(email);
        if (!b || b.password !== pwd || !b.emailVerified || !b.paymentCompleted) return false;
        S.setCurrentBroker(b.id); refresh(); return true;
      },
      logoutBroker() { S.setCurrentBroker(null); refresh(); },
      loginAdmin(e, p) {
        if (e === 'admin@mortgagemates.com' && p === 'admin@MM2024') { S.setAdmin(true); refresh(); return true; }
        return false;
      },
      logoutAdmin() { S.setAdmin(false); refresh(); },
      saveBroker(b) { S.saveBroker(b); refresh(); },
      saveApp(a) { S.saveApp(a); refresh(); },
      getBrokers: S.getBrokers,
      getAllApps: S.getApps,

      getAppById: S.getAppById,
      getBrokerById: S.getBrokerById,
    }}>

  );
}
function useApp() { return useContext(AppCtx); }

    if (!form.officeAddress.trim()) e.officeAddress = 'Required';
    if (!form.postalCode.trim()) e.postalCode = 'Required';
    if (!/^\+?[\d\s\-()+]{7,}$/.test(form.phoneNumber)) e.phoneNumber = 'Invalid phone number';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Invalid email';
    if (S.getBrokerByEmail(form.email)) e.email = 'Email already registered';
    if (form.password.length < 8) e.password = 'Min 8 characters';
    if (form.password !== form.confirmPassword) e.confirmPassword = 'Passwords do not match';
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  async function submitStep0() {
    if (!validateStep0()) return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,700));
    const id = genId('MM-BR');
    const now = new Date().toISOString();
    const b = { id, name:form.name, companyName:form.companyName, officeAddress:form.officeAddress,
      postalCode:form.postalCode, phoneNumber:form.phoneNumber, email:form.email, password:form.password,
      emailVerified:false, paymentCompleted:false, subscriptionStart:'', subscriptionEnd:'', createdAt:now };
    saveBroker(b); setDraftId(id); setLoading(false); setStep(1);
  }

  async function verifyEmail() {
    setLoading(true);
    await new Promise(r=>setTimeout(r,900));
    const b = S.getBrokerById(draftId);
    saveBroker({...b, emailVerified:true});
    setLoading(false); setStep(2);
  }

  async function completePayment() {
    setLoading(true);
    await new Promise(r=>setTimeout(r,1400));
    const b = S.getBrokerById(draftId);
    const now = new Date().toISOString();
    saveBroker({...b, paymentCompleted:true, subscriptionStart:now, subscriptionEnd:new Date(Date.now()+365*86400000).toISOString()});
    S.setCurrentBroker(draftId);
    setLoading(false);
    navigate('/broker/dashboard');
  }

  const inp = (k, label, type='text', placeholder='') => (
    <div key={k}>
      <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>
      <input type={type} className={`w-full px-3.5 py-2.5 bg-white border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${errors[k]?'border-red-400':'border-slate-200'}`}

      {errors[k] && <p className="mt-1 text-xs text-red-500">{errors[k]}</p>}

              <div className="grid grid-cols-2 gap-4">{inp('postalCode','Postal Code','text','SW1A 1AA')}{inp('phoneNumber','Phone Number','tel','+44 20 7000 0000')}</div>
              {inp('email','Official Email Address','email','you@company.com')}
              <div className="grid grid-cols-2 gap-4">{inp('password','Password','password','••••••••')}{inp('confirmPassword','Confirm Password','password','••••••••')}</div>
              <button onClick={submitStep0} disabled={loading} className="flex items-center justify-center gap-2 w-full px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 mt-2">

              <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Application Name</label><input className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Smith Property Purchase" value={appName} onChange={e=>setAppName(e.target.value)}/></div>
              <div className="grid grid-cols-2 gap-4">
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Client Full Name</label><input className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="John Smith" value={clientName} onChange={e=>setClientName(e.target.value)}/></div>
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Client Email</label><input type="email" className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="client@email.com" value={clientEmail} onChange={e=>setClientEmail(e.target.value)}/></div>
              </div>
            </div>
          </div>
          <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <h2 className="font-semibold text-slate-900 mb-1">Document Upload</h2>
            <p className="text-xs text-slate-400 mb-5">AI will extract key mortgage data from these PDFs automatically</p>
            <div className="space-y-4">
              <DropZone label="Commitment Letter (PDF)" file={commitment} setter={setCommitment} inputRef={commRef}/>
              <DropZone label="Credit Application (PDF)" file={credit} setter={setCredit} inputRef={credRef}/>
            </div>
          </div>
          {commitment && credit && (
            <div className="flex items-start gap-3 bg-blue-50 border border-blue-100 rounded-xl p-4">
              <span className="text-blue-500">⚡</span>
              <div><p className="text-sm font-medium text-blue-800">Ready to extract</p><p className="text-xs text-blue-600 mt-0.5">Both documents uploaded. Click below to auto-extract key fields from your PDFs.</p></div>
            </div>
          )}
          {err && <div className="bg-red-50 border border-red-100 rounded-xl p-4 text-sm text-red-700">⚠ {err}</div>}
          <div className="flex gap-3">
            <button onClick={() => navigate('/broker/applications')} className="flex-1 px-4 py-2.5 bg-white text-slate-700 text-sm font-medium rounded-lg border border-slate-200 hover:bg-slate-50">Cancel</button>
            <button onClick={handleCreate} disabled={!appName||!clientName||!clientEmail||!commitment||!credit||extracting} className="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50">
              {extracting?<><Spinner/>Extracting data…</>:<>⚡ Extract &amp; Create Application</>}
            </button>
          </div>
        </div>
      </div>
    </BrokerLayout>
  );
}

// ─── Application Detail ───────────────────────────────────────────────────────
function ApplicationDetail() {
  const { id } = useParams();
  const navigate = useNavigate();
  const { getAppById, saveApp } = useApp();
  const [app, setApp_] = useState(null);
  const [intake, setIntake] = useState({});
  const [status, setStatus] = useState('pending');
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [copied, setCopied] = useState(false);
  const [reqSig, setReqSig] = useState(false);
  const [tab, setTab] = useState('extracted');
  const [showStatusDrop, setShowStatusDrop] = useState(false);

  useEffect(() => {
    const a = getAppById(id);
    if (a) { setApp_(a); setIntake(a.intakeFormData||{}); setStatus(a.status); }
  }, [id]);

  if (!app) return (
    <BrokerLayout>
      <div className="flex items-center justify-center h-64">
        <p className="text-slate-400">Application not found.</p>
      </div>
    </BrokerLayout>
  );

  const STATUSES = ['draft','pending','in-review','submitted','approved','rejected','completed'];
  const INTAKE_FIELDS = [
    { k:'applicantName', l:'Applicant Full Name', sec:'Personal' },
    { k:'applicantPhone', l:'Phone Number', sec:'Personal' },
    { k:'applicantEmail', l:'Email Address', sec:'Personal' },
    { k:'propertyAddress', l:'Property Address', sec:'Property' },
    { k:'propertyType', l:'Property Type', sec:'Property' },
    { k:'purchasePrice', l:'Purchase Price', sec:'Financial' },
    { k:'loanAmount', l:'Loan Amount', sec:'Financial' },
    { k:'downPayment', l:'Down Payment', sec:'Financial' },
    { k:'loanType', l:'Loan Type', sec:'Financial' },
    { k:'interestRate', l:'Interest Rate', sec:'Financial' },
    { k:'loanTerm', l:'Loan Term', sec:'Financial' },
    { k:'closingDate', l:'Expected Closing Date', sec:'Timeline' },
    { k:'notes', l:'Broker Notes', sec:'Notes' },
  ];
  const sections = ['Personal','Property','Financial','Timeline','Notes'].map(sec=>({ sec, fields:INTAKE_FIELDS.filter(f=>f.sec===sec) }));

  async function handleSave() {
    setSaving(true);
    await new Promise(r=>setTimeout(r,500));
    const filled = INTAKE_FIELDS.filter(f=>intake[f.k]?.trim()).length;
    const progress = Math.min(100, Math.round(30 + (filled/INTAKE_FIELDS.length)*50 + (['approved','completed'].includes(status)?20:0)));
    const updated = {...app, intakeFormData:intake, status, progress, updatedAt:new Date().toISOString()};
    saveApp(updated); setApp_(updated);
    setSaving(false); setSaved(true); setTimeout(()=>setSaved(false),3000);
  }

  async function requestSig() {
    setReqSig(true); await new Promise(r=>setTimeout(r,800));
    const updated = {...app, signatureStatus:'pending', updatedAt:new Date().toISOString()};
    saveApp(updated); setApp_(updated); setReqSig(false);
  }

  function copyUrl() {
    const url = app.uniqueUrl || `${window.location.href.replace(/#.*$/,'')}#/client/${app.id}`;
    navigator.clipboard.writeText(url).catch(()=>{});
    setCopied(true); setTimeout(()=>setCopied(false),2000);
  }

  const extracted = app.extractedData || {};

  return (
    <BrokerLayout>
      <div className="p-8">
        <button onClick={() => navigate('/broker/applications')} className="text-sm text-slate-500 hover:text-slate-700 mb-6 flex items-center gap-1">← Back to Applications</button>
        <div className="flex items-start justify-between mb-6 gap-4">
          <div>
            <h1 className="text-2xl font-bold text-slate-900">{app.applicationName}</h1>
            <div className="flex items-center gap-3 mt-1.5 flex-wrap">
              <span className="text-xs font-mono text-slate-400 bg-slate-100 px-2 py-0.5 rounded">{app.id}</span>
              <StatusBadge status={app.status}/>
              <span className="text-xs text-slate-400">Created {fmtDate(app.createdAt)}</span>
            </div>
          </div>
          <div className="flex items-center gap-3 shrink-0">
            {saved && <span className="text-emerald-600 text-sm font-medium">✓ Saved</span>}
            <button onClick={handleSave} disabled={saving} className="flex items-center gap-2 px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50">
              {saving?<><Spinner/>Saving…</>:'💾 Save Changes'}
            </button>
          </div>
        </div>

        <div className="grid grid-cols-3 gap-6">
          <div className="col-span-2 space-y-6">
            {/* Progress */}
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
              <div className="flex items-center justify-between mb-3">
                <p className="text-sm font-semibold text-slate-700">Progress</p>
                <span className="text-sm font-bold text-blue-600">{app.progress}%</span>
              </div>
              <ProgressBar value={app.progress}/>
            </div>

            {/* Tabs */}
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="flex border-b border-slate-100">
                {['extracted','intake'].map(t=>(
                  <button key={t} onClick={()=>setTab(t)} className={`flex-1 py-3.5 text-sm font-medium transition-colors ${tab===t?'border-b-2 border-blue-600 text-blue-600 bg-blue-50/50':'text-slate-500 hover:text-slate-700'}`}>
                    {t==='extracted'?'📄 Extracted Data':'✏️ Intake Form'}
                  </button>
                ))}
              </div>
              {tab==='extracted' && (
                <div className="p-6">
                  {Object.keys(extracted).length===0 ? (
                    <div className="text-center py-10"><p className="text-4xl mb-3">📄</p><p className="text-slate-500 text-sm">No extracted data</p></div>
                  ) : (
                    <>
                      <div className="flex items-center gap-2 mb-4 p-3 bg-blue-50 border border-blue-100 rounded-xl">
                        <span className="text-blue-500">✓</span>
                        <p className="text-xs text-blue-700 font-medium">{Object.keys(extracted).length} fields extracted from your PDFs</p>
                      </div>
                      <div className="grid grid-cols-2 gap-x-6 gap-y-4">
                        {Object.entries(extracted).map(([k,v])=>(
                          <div key={k}><p className="text-xs font-medium text-slate-400 capitalize mb-0.5">{k.replace(/([A-Z])/g,' $1').trim()}</p><p className="text-sm font-medium text-slate-800">{v}</p></div>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              )}
              {tab==='intake' && (
                <div className="p-6 space-y-6">
                  {sections.map(({ sec, fields }) => (
                    <div key={sec}>
                      <p className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 pb-2 border-b border-slate-100">{sec}</p>
                      <div className="grid grid-cols-2 gap-4">
                        {fields.map(f=>(
                          <div key={f.k} className={f.k==='notes'?'col-span-2':''}>
                            <label className="block text-sm font-medium text-slate-700 mb-1.5">{f.l}</label>
                            {f.k==='notes' ? (
                              <textarea className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" rows={3}
                                value={intake[f.k]||(extracted[f.k]||'')} onChange={e=>setIntake(p=>({...p,[f.k]:e.target.value}))}/>
                            ) : (
                              <input className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder={extracted[f.k]?`Extracted: ${extracted[f.k]}`:''}
                                value={intake[f.k]||(extracted[f.k]||'')} onChange={e=>setIntake(p=>({...p,[f.k]:e.target.value}))}/>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Sidebar */}
          <div className="space-y-4">
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
              <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Client</p>
              <p className="font-semibold text-slate-900">{app.clientName}</p>
              <p className="text-sm text-slate-500 mt-0.5">{app.clientEmail}</p>
            </div>

            <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
              <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Status</p>
              <div className="relative">
                <button onClick={()=>setShowStatusDrop(v=>!v)} className="w-full flex items-center justify-between px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                  <StatusBadge status={status}/> <span className="text-slate-400">▾</span>
                </button>
                {showStatusDrop && (
                  <div className="absolute z-10 top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-lg py-1">
                    {STATUSES.map(s=>(
                      <button key={s} onClick={()=>{setStatus(s);setShowStatusDrop(false);}} className="w-full flex items-center gap-2 px-3 py-2 hover:bg-slate-50 text-left">
                        <StatusBadge status={s}/>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
              <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Documents</p>
              {app.commitmentLetterName ? <p className="text-xs text-emerald-600 flex items-center gap-1 mb-1.5"><span>✓</span><span className="truncate">{app.commitmentLetterName}</span></p> : <p className="text-xs text-slate-400">No commitment letter</p>}
              {app.creditApplicationName ? <p className="text-xs text-emerald-600 flex items-center gap-1"><span>✓</span><span className="truncate">{app.creditApplicationName}</span></p> : <p className="text-xs text-slate-400">No credit application</p>}
            </div>

            <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
              <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Client Access URL</p>
              <div className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-mono text-xs text-slate-500 break-all mb-3">
                {app.uniqueUrl || `…/client/${app.id}`}
              </div>
              <button onClick={copyUrl} className={`w-full px-4 py-2.5 text-xs font-medium rounded-lg border transition-colors ${copied?'bg-emerald-50 border-emerald-200 text-emerald-600':'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
                {copied?'✓ Copied!':'📋 Copy Client URL'}
              </button>
              <p className="text-xs text-slate-400 mt-2 text-center">Share this URL with your client offline</p>
            </div>

            <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
              <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Client Signature</p>
              {app.signatureStatus==='signed' ? (
                <div className="text-emerald-600 text-sm font-medium">✓ Signed {app.signedAt?fmtDT(app.signedAt):''}</div>
              ) : app.signatureStatus==='pending' ? (
                <div className="text-amber-600 text-sm font-medium">✏️ Awaiting client signature</div>
              ) : (
                <button onClick={requestSig} disabled={reqSig} className="flex items-center justify-center gap-2 w-full px-4 py-2.5 bg-blue-600 text-white text-xs font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50">
                  {reqSig?<><Spinner/>Requesting…</>:'📨 Request Signature'}
                </button>
              )}
            </div>
          </div>
        </div>
      </div>
    </BrokerLayout>
  );
}

// ─── Client View ─────────────────────────────────────────────────────────────
function ClientView() {
  const { applicationId } = useParams();
  const [app, setApp_] = useState(undefined);
  const [showSign, setShowSign] = useState(false);
  const [sigName, setSigName] = useState('');
  const [sigDrawn, setSigDrawn] = useState(false);
  const [signing, setSigning] = useState(false);
  const [signDone, setSignDone] = useState(false);

  useEffect(() => { const a = S.getAppById(applicationId); setApp_(a??null); }, [applicationId]);

  if (app===undefined) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><Spinner/></div>;

  if (app===null) return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 to-blue-950 flex items-center justify-center p-4 text-center">
      <div><p className="text-5xl mb-4">❌</p><h1 className="text-white text-xl font-bold mb-2">Application Not Found</h1><p className="text-slate-400 text-sm">The link may be incorrect. Please contact your broker.</p></div>
    </div>
  );

  const STATUS_INFO = {
    draft:       { icon:'⏳', color:'text-slate-600',   bg:'bg-slate-100',   title:'Draft',      desc:'Being prepared by your broker.' },
    pending:     { icon:'⏳', color:'text-amber-600',   bg:'bg-amber-100',   title:'Pending',    desc:'Submitted and awaiting review.' },
    'in-review': { icon:'📋', color:'text-blue-600',    bg:'bg-blue-100',    title:'In Review',  desc:'Currently being reviewed by the lender.' },
    submitted:   { icon:'📋', color:'text-purple-600',  bg:'bg-purple-100',  title:'Submitted',  desc:'Formally submitted to the lender.' },
    approved:    { icon:'✅', color:'text-emerald-600', bg:'bg-emerald-100', title:'Approved',   desc:'Congratulations! Your mortgage application has been approved.' },
    rejected:    { icon:'❌', color:'text-red-600',     bg:'bg-red-100',     title:'Rejected',   desc:'Not approved. Please contact your broker.' },
    completed:   { icon:'🎉', color:'text-teal-600',    bg:'bg-teal-100',    title:'Completed',  desc:'Your mortgage application is complete!' },
  };
  const info = STATUS_INFO[app.status] || STATUS_INFO.pending;

  const steps = [
    { label:'Application Created', done:true, date:fmtDate(app.createdAt) },
    { label:'Documents Uploaded', done:!!(app.commitmentLetterName && app.creditApplicationName) },
    { label:'Under Review', done:['in-review','submitted','approved','completed'].includes(app.status) },
    { label:'Decision Made', done:['approved','rejected','completed'].includes(app.status) },
    { label:'Signed & Complete', done:app.signatureStatus==='signed' },
  ];

  async function handleSign() {
    if (!sigName.trim()||!sigDrawn) return;
    setSigning(true); await new Promise(r=>setTimeout(r,1400));
    const updated = {...app, signatureStatus:'signed', signedAt:new Date().toISOString(), clientSignature:sigName, progress:Math.min(100,(app.progress||0)+20), updatedAt:new Date().toISOString()};
    S.saveApp(updated); setApp_(updated); setSigning(false); setSignDone(true); setShowSign(false);
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900">
      <header className="px-6 py-5 border-b border-white/10">
        <div className="max-w-2xl mx-auto flex items-center gap-3">
          <div className="w-9 h-9 rounded-xl bg-blue-500 flex items-center justify-center text-white font-bold">M</div>
          <div><p className="text-white font-bold text-sm">Mortgage Mates</p><p className="text-blue-300 text-xs">Client Application Portal</p></div>
        </div>
      </header>
      <div className="max-w-2xl mx-auto px-6 py-10">
        {signDone && (
          <div className="mb-6 flex items-center gap-3 bg-emerald-500/20 border border-emerald-500/30 rounded-2xl p-4">
            <span className="text-emerald-400 text-xl">✓</span>
            <div><p className="text-emerald-300 font-semibold text-sm">Documents signed successfully!</p><p className="text-emerald-400/70 text-xs mt-0.5">Your signature has been recorded. Your broker will be notified.</p></div>
          </div>
        )}

        <div className="bg-white/5 border border-white/10 rounded-2xl p-7 mb-6">
          <div className="flex items-start justify-between mb-6">
            <div>
              <p className="text-xs text-slate-400 uppercase tracking-wider mb-1.5">Application</p>
              <h1 className="text-2xl font-bold text-white">{app.applicationName}</h1>
              <p className="text-sm font-mono text-blue-400 mt-1">{app.id}</p>
            </div>
            <div className={`w-14 h-14 rounded-2xl ${info.bg} flex items-center justify-center text-3xl`}>{info.icon}</div>
          </div>
          <div className={`${info.bg} rounded-xl px-4 py-3 mb-6`}>
            <p className={`text-sm font-semibold ${info.color} mb-0.5`}>{info.title}</p>
            <p className={`text-xs ${info.color} opacity-80`}>{info.desc}</p>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <div><p className="text-xs text-slate-500 mb-1">Client Name</p><p className="text-sm font-medium text-white">{app.clientName}</p></div>
            <div><p className="text-xs text-slate-500 mb-1">Created</p><p className="text-sm font-medium text-white">{fmtDate(app.createdAt)}</p></div>
          </div>
          <div className="mb-6">
            <div className="flex items-center justify-between mb-2"><p className="text-xs text-slate-400">Progress</p><p className="text-xs font-bold text-blue-400">{app.progress}%</p></div>
            <div className="h-2 bg-white/10 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-blue-500 to-cyan-400 rounded-full transition-all duration-700" style={{width:`${app.progress}%`}}/>
            </div>
          </div>
          {app.signatureStatus==='pending' && !signDone && (
            <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl p-4 mb-4">
              <p className="text-amber-300 font-semibold text-sm mb-1.5">✏️ Signature Required</p>
              <p className="text-xs text-amber-400/80 mb-3">Your broker has requested your signature to proceed.</p>
              <button onClick={()=>setShowSign(true)} className="w-full py-2.5 bg-amber-500 hover:bg-amber-400 text-white text-sm font-semibold rounded-xl transition-colors">Sign Documents</button>
            </div>
          )}
          {app.signatureStatus==='signed' && (
            <div className="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4">
              <span className="text-emerald-400">✓</span>
              <div><p className="text-emerald-300 text-sm font-semibold">Documents Signed</p>{app.signedAt&&<p className="text-xs text-emerald-400/70">{fmtDT(app.signedAt)}</p>}</div>
            </div>
          )}
        </div>

        <div className="bg-white/5 border border-white/10 rounded-2xl p-6">
          <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-5">Application Timeline</p>
          {steps.map((step,i)=>(
            <div key={step.label} className="flex items-start gap-4">
              <div className="flex flex-col items-center">
                <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs ${step.done?'bg-blue-500 border-blue-500 text-white':'bg-transparent border-slate-600 text-slate-600'}`}>
                  {step.done?'✓':''}
                </div>
                {i<steps.length-1&&<div className={`w-0.5 h-8 mt-1 ${step.done?'bg-blue-500/40':'bg-slate-700'}`}/>}
              </div>
              <div className="pb-6">
                <p className={`text-sm font-medium mt-0.5 ${step.done?'text-white':'text-slate-500'}`}>{step.label}</p>
                {step.date&&<p className="text-xs text-slate-500 mt-0.5">{step.date}</p>}
              </div>
            </div>
          ))}
        </div>
        <p className="text-center text-slate-600 text-xs mt-8">Questions? Contact your broker directly. · Mortgage Mates © 2024</p>
      </div>

      {showSign && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/80" onClick={()=>setShowSign(false)}/>
          <div className="relative w-full max-w-md bg-white rounded-2xl shadow-2xl p-7">
            <h3 className="text-lg font-bold text-slate-900 mb-2">Sign Documents</h3>
            <p className="text-sm text-slate-500 mb-6">By signing below, you confirm all information is accurate and agree to the mortgage terms.</p>
            <div className="mb-4">
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Full Legal Name</label>
              <input className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type your full name" value={sigName} onChange={e=>setSigName(e.target.value)}/>
            </div>
            <div className="mb-6">
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Signature</label>
              <div onClick={()=>setSigDrawn(true)} className={`h-28 border-2 border-dashed rounded-xl flex items-center justify-center cursor-pointer transition-colors ${sigDrawn?'border-blue-400 bg-blue-50':'border-slate-200 hover:border-slate-300'}`}>
                {sigDrawn ? <p className="text-blue-700 font-bold text-xl" style={{fontFamily:'cursive'}}>{sigName||'Signed'}</p> : <p className="text-slate-400 text-sm">Click to add signature</p>}
              </div>
            </div>
            <div className="flex gap-3">
              <button onClick={()=>setShowSign(false)} className="flex-1 px-4 py-2.5 bg-white text-slate-700 text-sm font-medium rounded-lg border border-slate-200 hover:bg-slate-50">Cancel</button>
              <button onClick={handleSign} disabled={!sigName.trim()||!sigDrawn||signing} className="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50">
                {signing?<><Spinner/>Signing…</>:'✓ Confirm & Sign'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Admin Login ──────────────────────────────────────────────────────────────
function AdminLogin() {
  const navigate = useNavigate();
  const { loginAdmin } = useApp();
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  async function submit(e) {
    e.preventDefault(); setErr(''); setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    if (loginAdmin(email,pwd)) navigate('/admin/dashboard');
    else setErr('Invalid administrator credentials.');
    setLoading(false);
  }
  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-violet-950 to-slate-900 flex items-center justify-center p-4">
      <div className="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8">
        <div className="text-center mb-8">
          <div className="w-14 h-14 rounded-2xl bg-violet-600 flex items-center justify-center mx-auto mb-4 text-white text-3xl">🔒</div>
          <h1 className="text-2xl font-bold text-slate-900">Admin Access</h1>
          <p className="text-slate-500 text-sm mt-1">Restricted to authorised administrators</p>
        </div>
        <div className="bg-violet-50 border border-violet-100 rounded-xl p-3 mb-6 text-xs text-violet-700">
          <strong>Demo:</strong> admin@mortgagemates.com / admin@MM2024
        </div>
        {err && <div className="bg-red-50 border border-red-100 text-red-700 text-sm rounded-xl p-3 mb-4">⚠ {err}</div>}
        <form onSubmit={submit} className="space-y-4">
          <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Email</label><input type="email" className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-violet-500" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
          <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Password</label><input type="password" className="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-violet-500" value={pwd} onChange={e=>setPwd(e.target.value)} required/></div>
          <button type="submit" disabled={loading} className="flex items-center justify-center gap-2 w-full px-4 py-2.5 bg-violet-600 text-white text-sm font-medium rounded-lg hover:bg-violet-700 disabled:opacity-50">
            {loading?<><Spinner/>Signing in…</>:'Sign In as Admin'}
          </button>
        </form>
        <p className="text-center text-xs text-slate-400 mt-6"><button onClick={() => navigate('/')} className="hover:underline">← Back to home</button></p>
      </div>
    </div>
  );
}

// ─── Admin Dashboard ──────────────────────────────────────────────────────────

    <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
      <div className="flex items-center justify-between mb-4">
        <p className="text-sm font-medium text-slate-500">{label}</p>
        <div className={`w-9 h-9 rounded-xl flex items-center justify-center ${color} text-white text-lg`}>{icon}</div>
      </div>

          <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h2 className="font-semibold text-slate-900">Registered Brokers</h2>

            <div className="py-16 text-center"><p className="text-4xl mb-3">👥</p><p className="text-slate-500">No brokers registered yet</p></div>

                <div className="col-span-3">Company</div><div className="col-span-1">Apps</div>

                  return (
                    <button key={b.id} onClick={()=>navigate(`/admin/brokers/${b.id}`)} className="w-full grid grid-cols-12 gap-4 px-6 py-4 hover:bg-slate-50 transition-colors items-center text-left">

// ─── Admin Broker Detail ──────────────────────────────────────────────────────
function AdminBrokerDetail() {
  const { brokerId } = useParams();
  const navigate = useNavigate();
  const { getBrokerById, getAppsByBroker, saveApp, getAppById } = useApp();
  const broker = getBrokerById(brokerId);
  const [openDrop, setOpenDrop] = useState(null);
  const [saving, setSaving] = useState(null);
  const [savedId, setSavedId] = useState(null);

  if (!broker) return <AdminLayout><div className="flex items-center justify-center h-64"><p className="text-slate-400">Broker not found.</p></div></AdminLayout>;

  const apps = getAppsByBroker(broker.id);
  const isActive = broker.paymentCompleted && broker.emailVerified;
  const expired = broker.subscriptionEnd && new Date(broker.subscriptionEnd)<new Date();
  const STATUSES = ['draft','pending','in-review','submitted','approved','rejected','completed'];

  async function changeStatus(appId, status) {
    setOpenDrop(null); setSaving(appId);
    await new Promise(r=>setTimeout(r,500));
    const app = getAppById(appId);
    if (app) {
      const progress = status==='approved'||status==='completed'?100:status==='submitted'?80:status==='in-review'?60:status==='pending'?30:app.progress;
      saveApp({...app, status, progress, updatedAt:new Date().toISOString()});
    }
    setSaving(null); setSavedId(appId); setTimeout(()=>setSavedId(null),2000);
  }

  return (
    <AdminLayout>
      <div className="p-8">
        <button onClick={()=>navigate('/admin/dashboard')} className="text-sm text-slate-500 hover:text-slate-700 mb-6 flex items-center gap-1">← Back to Dashboard</button>
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
          <div className="flex items-start gap-5">
            <div className="w-16 h-16 rounded-2xl bg-violet-100 flex items-center justify-center text-2xl font-bold text-violet-600 shrink-0">{broker.name.charAt(0)}</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-start justify-between flex-wrap gap-3">
                <div>
                  <h1 className="text-xl font-bold text-slate-900">{broker.name}</h1>
                  <p className="text-slate-500">{broker.companyName}</p>
                  <p className="text-xs font-mono text-violet-600 font-semibold mt-1">{broker.id}</p>
                </div>
                <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${isActive?(expired?'bg-red-100 text-red-700':'bg-emerald-100 text-emerald-700'):'bg-slate-100 text-slate-500'}`}>
                  {isActive?(expired?'Subscription Expired':'Active Subscriber'):'Inactive'}
                </span>
              </div>
              <div className="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3">
                <p className="text-sm text-slate-600">📧 {broker.email}</p>
                <p className="text-sm text-slate-600">📞 {broker.phoneNumber}</p>
                <p className="text-sm text-slate-600">📍 {broker.officeAddress}, {broker.postalCode}</p>
              </div>
            </div>
          </div>
          <div className="mt-5 pt-5 border-t border-slate-100 grid grid-cols-2 sm:grid-cols-4 gap-4">
            {[
              { label:'Email Verified', value:broker.emailVerified?'Verified':'Not Verified', ok:broker.emailVerified },
              { label:'Payment', value:broker.paymentCompleted?'Completed':'Pending', ok:broker.paymentCompleted },
              { label:'Sub Start', value:broker.subscriptionStart?fmtDate(broker.subscriptionStart):'—', ok:true },
              { label:'Sub End', value:broker.subscriptionEnd?fmtDate(broker.subscriptionEnd):'—', ok:!expired },
            ].map(({label,value,ok})=>(
              <div key={label}><p className="text-xs text-slate-400 font-medium mb-1">{label}</p><p className={`text-sm font-semibold ${ok?'text-emerald-600':'text-red-500'}`}>{value}</p></div>
            ))}
          </div>
        </div>

        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h2 className="font-semibold text-slate-900">Applications</h2>
            <span className="text-xs text-slate-400 bg-slate-100 px-2.5 py-1 rounded-full">{apps.length} total</span>
          </div>
          {apps.length===0 ? (
            <div className="py-16 text-center"><p className="text-4xl mb-3">📋</p><p className="text-slate-500">No applications under this broker</p></div>
          ) : (
            <>
              <div className="grid grid-cols-12 gap-4 px-6 py-3 bg-slate-50 border-b border-slate-100 text-xs font-semibold uppercase tracking-wider text-slate-400">
                <div className="col-span-4">Application</div><div className="col-span-2">Client</div>
                <div className="col-span-2">Progress</div><div className="col-span-3">Status (Admin Control)</div><div className="col-span-1"></div>
              </div>
              <div className="divide-y divide-slate-50">
                {apps.map(app=>(
                  <div key={app.id} className="grid grid-cols-12 gap-4 px-6 py-4 items-center">
                    <div className="col-span-4 flex items-center gap-3">
                      <div className="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center shrink-0 text-sm">📄</div>
                      <div className="min-w-0">
                        <p className="text-sm font-semibold text-slate-900 truncate">{app.applicationName}</p>
                        <p className="text-xs font-mono text-slate-400">{app.id}</p>
                        <p className="text-xs text-slate-400">{fmtDate(app.createdAt)}</p>
                      </div>
                    </div>
                    <div className="col-span-2 min-w-0">
                      <p className="text-sm text-slate-700 truncate">{app.clientName}</p>
                      <p className="text-xs text-slate-400 truncate">{app.clientEmail}</p>
                    </div>
                    <div className="col-span-2"><ProgressBar value={app.progress}/></div>
                    <div className="col-span-3 relative">
                      {savedId===app.id ? (
                        <span className="text-emerald-600 text-sm font-medium">✓ Updated</span>
                      ) : saving===app.id ? (
                        <div className="flex items-center gap-2 text-slate-500 text-sm"><Spinner/>Saving…</div>
                      ) : (
                        <div className="relative">
                          <button onClick={()=>setOpenDrop(openDrop===app.id?null:app.id)} className="flex items-center gap-2 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm hover:bg-slate-100 w-full">
                            <StatusBadge status={app.status}/> <span className="ml-auto text-slate-400">▾</span>
                          </button>
                          {openDrop===app.id && (
                            <div className="absolute z-20 top-full left-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-xl py-1 min-w-[160px]">
                              {STATUSES.map(s=>(
                                <button key={s} onClick={()=>changeStatus(app.id,s)} className="w-full flex items-center gap-2 px-3 py-2 hover:bg-slate-50 text-left">
                                  <StatusBadge status={s}/>{s===app.status&&<span className="ml-auto text-blue-500 text-xs">✓</span>}
                                </button>
                              ))}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                    <div className="col-span-1 flex justify-end">
                      <button onClick={()=>navigate(`/broker/applications/${app.id}`)} className="p-1.5 text-slate-400 hover:text-slate-600">→</button>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </AdminLayout>
  );
}

// ─── Protected Wrappers ───────────────────────────────────────────────────────
function RequireBroker({ children }) {
  const { currentBroker } = useApp();
  const navigate = useNavigate();
  useEffect(() => { if (!currentBroker) navigate('/broker/login'); }, [currentBroker]);
  if (!currentBroker) return null;
  return children;
}

function RequireAdmin({ children }) {
  const { isAdminAuthed } = useApp();
  const navigate = useNavigate();
  useEffect(() => { if (!isAdminAuthed) navigate('/admin'); }, [isAdminAuthed]);
  if (!isAdminAuthed) return null;
  return children;
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  // seedData already called before mount

  return (
    <Router>
      <AppProvider>
        <Routes>
          <Route path="/" element={<Landing/>}/>
          <Route path="/broker/login" element={<BrokerLogin/>}/>
          <Route path="/broker/signup" element={<BrokerSignup/>}/>
          <Route path="/broker/dashboard" element={<RequireBroker><BrokerDashboard/></RequireBroker>}/>
          <Route path="/broker/applications" element={<RequireBroker><ApplicationsList/></RequireBroker>}/>
          <Route path="/broker/applications/new" element={<RequireBroker><NewApplication/></RequireBroker>}/>
          <Route path="/broker/applications/:id" element={<RequireBroker><ApplicationDetail/></RequireBroker>}/>
          <Route path="/client/:applicationId" element={<ClientView/>}/>
          <Route path="/admin" element={<AdminLogin/>}/>
          <Route path="/admin/dashboard" element={<RequireAdmin><AdminDashboard/></RequireAdmin>}/>
          <Route path="/admin/brokers" element={<RequireAdmin><AdminDashboard/></RequireAdmin>}/>
          <Route path="/admin/brokers/:brokerId" element={<RequireAdmin><AdminBrokerDetail/></RequireAdmin>}/>
        </Routes>
      </AppProvider>
    </Router>
  );
}

// ─── Route switcher ───────────────────────────────────────────────────────────
function Routes({ children }) {
  const { path } = useContext(RouterCtx);
  let matched = null;
  React.Children.forEach(children, child => {
    if (matched) return;
    const params = matchPath(child.props.path, path.split('?')[0]);
    if (params !== null) matched = React.cloneElement(child, { _params: params });
  });
  return matched || null;
}

// Patch Route to use _params
function Route({ path: p, element, _params }) {
  const ctx = useContext(RouterCtx);
  if (_params === undefined) return null;
  return <RouterCtx.Provider value={{...ctx, params:_params}}>{element}</RouterCtx.Provider>;
}

// Run seed data synchronously before first render
seedData();
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
